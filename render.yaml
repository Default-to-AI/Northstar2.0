services:
  - type: web
    name: northstar2-api
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Point the API at a persistent disk file.
      # Create a Render disk mounted at /var/data and keep this value as-is.
      - key: NORTHSTAR_DB_PATH
        value: /var/data/northstar.db
      # Optional knob: refresh cooldown (ms). Default in code is 300000 (5m).
      # - key: SECURITY_EVIDENCE_REFRESH_COOLDOWN_MS
      #   value: "300000"

disks:
  - name: northstar-data
    mountPath: /var/data
    sizeGB: 1
